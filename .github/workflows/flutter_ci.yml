name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK (PRs only)
        if: github.ref != 'refs/heads/main'
        run: flutter build apk --debug

      - name: Restore Keystore
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: github.ref == 'refs/heads/main'
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Validate Signing Files
        if: github.ref == 'refs/heads/main'
        run: |
          test -f android/app/upload-keystore.jks
          test -f android/key.properties
          echo "Keystore restored successfully"
          echo "key.properties created successfully"

      - name: Build Android AAB
        if: github.ref == 'refs/heads/main'
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Validate AAB
        if: github.ref == 'refs/heads/main'
        run: |
          test -f build/app/outputs/bundle/release/app-release.aab
          echo "AAB built successfully"

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: alchemy-sort-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
      
      - name: Deploy to Google Play Internal Testing
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.abhishek.alchemy_sort
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
